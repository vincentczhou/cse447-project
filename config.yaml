# Inference configuration for myprogram.py

model:
  binary: 15k_char6_000122.binary        # KenLM binary model filename (relative to work_dir)
  vocab: 15k_vocab.json            # Vocabulary JSON filename (relative to work_dir)
  exclude_tokens:              # KenLM special tokens to exclude from candidates
    - "<s>"
    - "</s>"

prediction:
  top_k: 3                     # Number of top predictions to return
  fallback: " ea"              # Default prediction when errors occur (most common chars)

workers:
  max_workers: 8               # Maximum number of parallel workers
  sequential_threshold: 100    # Use sequential mode below this many inputs
  chunk_divisor: 4             # chunksize = len(data) // (num_workers * chunk_divisor)

wandb:
  enabled: true
  project: cse447
  entity: vincentczhou-university-of-washington
  run_name: test_overfit_noNgram _1024_batch              # Custom wandb run name (null = auto-generated)
  silent: true                 # Suppress wandb console output

# ---------------------------------------------------------------------------
# Reranker training configuration (used by src/train_reranker.py)
# ---------------------------------------------------------------------------
reranker:
  # --- Model architecture (saved with checkpoint for inference loading) ---
  architecture:
    d_model: 256               # Embedding / hidden dimension
    nhead: 8                   # Number of attention heads (d_model must be divisible by this)
    num_layers: 4              # Number of Transformer encoder layers
    ff_mult: 4                 # Feed-forward hidden dim = d_model * ff_mult
    dropout: 0.1               # Dropout rate
    max_context_len: 200       # Max prefix length the model can handle
    norm_first: true           # Pre-norm (true, modern/stable) vs post-norm (false)
    temperature: 1.0           # Initial logit temperature (learned during training)

  # --- Training hyperparameters ---
  training:
    epochs: 20
    batch_size: 512
    eval_batch_size: 512
    candidate_size: 64         # Number of candidates per example (gold + negatives)
    lr: 3.0e-4                 # Learning rate (AdamW)
    weight_decay: 0.01
    grad_clip: 1.0             # Gradient norm clipping
    warmup_steps: 500          # Linear warmup steps before decay
    gradient_accumulation_steps: 1
    mixed_precision: false      # AMP (only active on CUDA)
    cpu: false                 # Force CPU even if GPU is available
    lr_scheduler: cosine       # "cosine" or "linear" (with warmup)
    min_lr_ratio: 0.1          # Final LR = lr * min_lr_ratio
    seed: 42

  # --- Early stopping / best model ---
  early_stopping:
    patience: 20                # Epochs without improvement before stopping
    metric: valid_top3         # "valid_top3" (higher=better) or "valid_loss" (lower=better)

  # --- Data paths (relative to repo root) ---
  data:
    train_path: data/madlad_multilang_clean_15k_optionB_kenlm/train.txt
    valid_path: data/madlad_multilang_clean_15k_optionB_kenlm/valid.txt
    vocab_path: data/madlad_multilang_clean_15k_optionB_kenlm/vocab.json

  # --- Data limits (for quick iteration / memory control, null = no limit) ---
  data_limits:
    # max_train_lines: null
    max_train_lines: 100
    # max_valid_lines: null
    max_valid_lines: 20
    max_train_examples: null
    max_valid_examples: 50000
    max_eval_batches: 200

  # --- Output ---
  output:
    out_dir: work
    checkpoint_name: reranker.pt
    resume_from: null          # Path to checkpoint for training resumption

  # --- Logging ---
  logging:
    log_every: 100             # Print training loss every N optimizer steps
    num_workers: 2             # DataLoader workers
